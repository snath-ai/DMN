name: CI — lar-dmn

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [lar-engine-updated]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dev deps
        run: poetry install --no-interaction --with dev

      - name: Run tests
        run: poetry run pytest tests/ -v

  dispatch:
    name: Trigger lar-jepa CI
    needs: test
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch lar-jepa CI
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CROSS_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/snath-ai/Lar-JEPA/dispatches \
            -d '{"event_type":"lar-dmn-updated"}'
