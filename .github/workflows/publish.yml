name: Publish lar-dmn

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout lar-dmn → Lar_Main/DMN/lar
        uses: actions/checkout@v4
        with:
          path: Lar_Main/DMN/lar

      - name: Checkout lar-engine → Lar_Main/lar
        uses: actions/checkout@v4
        with:
          repository: snath-ai/lar
          path: Lar_Main/lar
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: snok/install-poetry@v1
        with:
          version: 1.8.2

      - name: Install lar-dmn + dev deps
        run: |
          cd Lar_Main/DMN/lar
          poetry install --sync --with dev

      - name: Run tests
        run: |
          cd Lar_Main/DMN/lar
          poetry run pytest tests/ -v

      - name: Build wheel + sdist
        run: |
          cd Lar_Main/DMN/lar
          poetry build

      - uses: actions/upload-artifact@v4
        with:
          name: lar-dmn-dist
          path: Lar_Main/DMN/lar/dist/

  publish:
    name: Attach wheel to GitHub Release
    needs: build_and_test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lar-dmn-dist
          path: dist/

      - name: Upload wheel + sdist to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
